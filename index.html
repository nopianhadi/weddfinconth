<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeddFin</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
      color: #3a3a3a;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      color: #5a4a3a;
    }

    .tagline {
      font-size: 1.1rem;
      color: #8a7a6a;
      font-style: italic;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c0a88a;
      margin: 0 auto 2rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      color: #6a5a4a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeddFin</h1>
    <p class="tagline">A dreamy web app</p>
    <div class="divider"></div>
    <p>Welcome to WeddFin. Something beautiful is on its way.</p>
  </div>
</body>
</html>
