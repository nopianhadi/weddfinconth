<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeddFin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6f0;
      color: #3d2b1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
      color: #b5813a;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      color: #7a5c3e;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: #b5813a;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WeddFin</h1>
    <div class="divider"></div>
    <p>Welcome to WeddFin — your trusted partner for wedding financial planning. We're getting things ready for you.</p>
  </div>
</body>
</html>
